<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>stg</title>
  <style type="text/css">
    html, body {
      height: 100%;
      margin: 0;
      font-family:monospace;
      font-size:large;
    }
    canvas {
      border: 1px solid red;
      background-color: gray;
      display: block;
      z-index: 0;
    }
    body {
      display: flex;
      justify-content: center;  /* horizontal center */
      align-items: center;      /* vertical center */
      background-color: rgb(50, 50, 50);
    }
    #god_menu {
      height: 400px;
      width: 200px;
      position: absolute;
      z-index: 1;
      top: 0;
      left: 0;
      margin: 25px;
      background-color: rgb(100, 100, 100);
      border: 2px solid black;
      color: black;
    }
  </style>
</head>
<body>
  <canvas></canvas>
  <div id="god_menu">God Menu <br>
    tile
    <input type="number" id="god_tile_x" placeholder="x" style="width: 30px">
    <input type="number" id="god_tile_y" placeholder="y" style="width: 30px"> <br>
    action
      <select id="god_action">
        <option value="terrain">set terrain</option>
        <option value="troops">set troops</option>
        <option value="owner">set owner</option>
        <option value="read">read tile</option>
      </select> <br>
    input
    <input type="text" id="god_input" size="12">
    <div style="position: absolute; bottom: 0; margin-left: 1px; margin-bottom: 2px">
      <input type="button" id="god_apply_button" value="apply">
    </div>
  </div>
  <script type="module" src="/src/webpage/main.ts"></script>
  <script type="module" src="/src/webpage/god_menu.ts"></script>
</body>
</html>
